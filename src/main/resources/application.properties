# ============================
# Lisory Backend - Configuration
# Single source of truth for all environments.
# Secrets and credentials are injected via environment variables.
# ============================

spring.application.name=Lisory

# Server
server.port=${PORT:8080}
server.forward-headers-strategy=framework
server.shutdown=graceful

# Encoding
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# Timezone
spring.jackson.time-zone=America/Sao_Paulo
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss

# PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:20}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:5}
spring.datasource.hikari.idle-timeout=${DB_POOL_IDLE_TIMEOUT:300000}
spring.datasource.hikari.max-lifetime=${DB_POOL_MAX_LIFETIME:1200000}
spring.datasource.hikari.connection-timeout=${DB_POOL_CONNECTION_TIMEOUT:30000}
spring.datasource.hikari.leak-detection-threshold=${DB_POOL_LEAK_THRESHOLD:60000}

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${FORMAT_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://lisory.com.br,https://www.lisory.com.br}

# Rate Limiting
rate-limit.login.max-attempts=${RATE_LIMIT_LOGIN_MAX:5}
rate-limit.login.duration-minutes=${RATE_LIMIT_LOGIN_DURATION:15}
rate-limit.register.max-attempts=${RATE_LIMIT_REGISTER_MAX:3}
rate-limit.register.duration-minutes=${RATE_LIMIT_REGISTER_DURATION:60}

# Melhor Envio
melhor-envio.client-id=${MELHOR_ENVIO_CLIENT_ID}
melhor-envio.client-secret=${MELHOR_ENVIO_CLIENT_SECRET}
melhor-envio.api-url=${MELHOR_ENVIO_API_URL:https://api.melhorenvio.com.br}
melhor-envio.user-agent=${MELHOR_ENVIO_USER_AGENT:Lisory (contato@lisory.com.br)}
melhor-envio.callback-url=${MELHOR_ENVIO_CALLBACK_URL:https://api.lisory.com.br/api/integrations/melhor-envio/oauth/callback}
melhor-envio.scopes=${MELHOR_ENVIO_SCOPES:cart-read cart-write orders-read shipping-calculate shipping-cancel shipping-checkout shipping-companies shipping-generate shipping-preview shipping-print shipping-share shipping-tracking}
melhor-envio.origin-cep=${MELHOR_ENVIO_ORIGIN_CEP:01310-100}

# Asaas (sandbox: https://sandbox.asaas.com/api/v3, production: https://api.asaas.com/api/v3)
# Get your API key at https://sandbox.asaas.com (sandbox) or https://www.asaas.com (production)
asaas.api-key=${ASAAS_API_KEY}
asaas.api-url=${ASAAS_API_URL:https://sandbox.asaas.com/api/v3}
asaas.redirect-url=${ASAAS_REDIRECT_URL:https://lisory.com.br/confirmation}

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
management.health.db.enabled=true

# Logging
logging.level.root=INFO
logging.level.com.lisory.backend=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql=WARN

# Compression
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/css,text/javascript,application/javascript
server.compression.min-response-size=1024

# Graceful shutdown
spring.lifecycle.timeout-per-shutdown-phase=30s

# Data initializer (enable only for first-run seeding)
data.initializer.enabled=${DATA_INITIALIZER_ENABLED:false}
